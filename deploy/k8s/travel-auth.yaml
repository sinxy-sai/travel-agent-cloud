apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-auth
  namespace: travel-agent-cloud
  labels:
    app: travel-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-auth
  template:
    metadata:
      labels:
        app: travel-auth
    spec:
      containers:
        - name: travel-auth
          image: docker.io/sinxysai/travel-agent-cloud-travel-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8300
          env:
            - name: AGENT_RUNTIME_URL
              value: http://agent-runtime:8000
            - name: ALLOWED_ORIGINS
              value: "*"
            - name: AUTH_SERVICE_REQUEST_TIMEOUT_SECONDS
              value: "180"
          readinessProbe:
            httpGet:
              path: /health
              port: 8300
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8300
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: travel-auth
  namespace: travel-agent-cloud
spec:
  selector:
    app: travel-auth
  ports:
    - name: http
      port: 8300
      targetPort: 8300
