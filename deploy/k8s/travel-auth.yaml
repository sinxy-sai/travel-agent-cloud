apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-auth
  namespace: travel-agent-cloud
  labels:
    app: travel-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-auth
  template:
    metadata:
      labels:
        app: travel-auth
    spec:
      containers:
        - name: travel-auth
          image: docker.io/sinxysai/travel-agent-cloud-travel-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8300
          env:
            - name: AGENT_RUNTIME_URL
              value: http://agent-runtime:8000
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: DATABASE_URL
                  optional: true
            - name: ALLOWED_ORIGINS
              value: "*"
            - name: AUTH_SERVICE_REQUEST_TIMEOUT_SECONDS
              value: "180"
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: AUTH_SECRET_KEY
                  optional: true
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: INTERNAL_SERVICE_TOKEN
                  optional: true
            - name: AUTH_TOKEN_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: AUTH_TOKEN_TTL_SECONDS
                  optional: true
            - name: AUTH_COOKIE_SECURE
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: AUTH_COOKIE_SECURE
                  optional: true
            - name: AUTH_RATE_LIMIT_MAX_ATTEMPTS
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: AUTH_RATE_LIMIT_MAX_ATTEMPTS
                  optional: true
            - name: AUTH_RATE_LIMIT_WINDOW_SECONDS
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: AUTH_RATE_LIMIT_WINDOW_SECONDS
                  optional: true
            - name: EMAIL_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: EMAIL_PROVIDER
                  optional: true
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: EMAIL_FROM
                  optional: true
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: SMTP_USERNAME
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: SMTP_PASSWORD
                  optional: true
            - name: SMTP_USE_SSL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: SMTP_USE_SSL
                  optional: true
            - name: SMTP_STARTTLS
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: SMTP_STARTTLS
                  optional: true
            - name: PUBLIC_APP_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: PUBLIC_APP_URL
                  optional: true
            - name: GITHUB_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: GITHUB_OAUTH_CLIENT_ID
                  optional: true
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: GITHUB_OAUTH_CLIENT_SECRET
                  optional: true
            - name: GITHUB_OAUTH_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: GITHUB_OAUTH_REDIRECT_URI
                  optional: true
            - name: OAUTH_HTTP_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: OAUTH_HTTP_TIMEOUT_SECONDS
                  optional: true
            - name: MINIO_ENDPOINT
              value: minio:9000
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_USER
                  optional: true
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_PASSWORD
                  optional: true
            - name: MINIO_BUCKET
              value: travel-agent-exports
            - name: MINIO_SECURE
              value: "false"
            - name: EMAIL_VERIFICATION_TOKEN_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: EMAIL_VERIFICATION_TOKEN_TTL_SECONDS
                  optional: true
            - name: PASSWORD_RESET_TOKEN_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: PASSWORD_RESET_TOKEN_TTL_SECONDS
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8300
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8300
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: travel-auth
  namespace: travel-agent-cloud
spec:
  selector:
    app: travel-auth
  ports:
    - name: http
      port: 8300
      targetPort: 8300
