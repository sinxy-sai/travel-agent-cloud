apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-agent
  namespace: travel-agent-cloud
  labels:
    app: travel-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-agent
  template:
    metadata:
      labels:
        app: travel-agent
    spec:
      containers:
        - name: travel-agent
          image: docker.io/sinxysai/travel-agent-cloud-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8400
          env:
            - name: AGENT_RUNTIME_URL
              value: http://agent-runtime:8000
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: DATABASE_URL
                  optional: true
            - name: ALLOWED_ORIGINS
              value: "*"
            - name: AGENT_SERVICE_REQUEST_TIMEOUT_SECONDS
              value: "180"
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: AUTH_SECRET_KEY
                  optional: true
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: INTERNAL_SERVICE_TOKEN
                  optional: true
            - name: MESSAGE_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: MESSAGE_QUEUE_URL
                  optional: true
            - name: RPC_TIMEOUT_SECONDS
              value: "5"
          readinessProbe:
            httpGet:
              path: /health
              port: 8400
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8400
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: travel-agent
  namespace: travel-agent-cloud
spec:
  selector:
    app: travel-agent
  ports:
    - name: http
      port: 8400
      targetPort: 8400
