apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: travel-agent-cloud
  labels:
    app: agent-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-runtime
  template:
    metadata:
      labels:
        app: agent-runtime
    spec:
      containers:
        - name: agent-runtime
          image: docker.io/sinxysai/travel-agent-cloud-agent-runtime:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: ALLOWED_ORIGINS
              value: "*"
            - name: LOG_LEVEL
              value: INFO
            - name: RPC_TIMEOUT_SECONDS
              value: "5"
            - name: RAG_ENABLED
              value: "true"
            - name: AGENT_ENGINE
              value: langgraph
            - name: TRAVEL_TOOL_PROVIDER
              value: fastmcp
            - name: FASTMCP_BASE_URL
              value: http://travel-mcp:8100/mcp
            - name: WEB_RESEARCH_ENABLED
              value: "true"
            - name: SEARXNG_BASE_URL
              value: http://searxng:8080
            - name: WEB_RESEARCH_TIMEOUT_SECONDS
              value: "6"
            - name: WEB_RESEARCH_MAX_RESULTS
              value: "4"
            - name: WEB_RESEARCH_LANGUAGE
              value: auto
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAMESPACE
              value: travel-agent-cloud
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo:4318
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: INTERNAL_SERVICE_TOKEN
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: DATABASE_URL
                  optional: true
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: LLM_PROVIDER
                  optional: true
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: LLM_API_KEY
                  optional: true
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: LLM_BASE_URL
                  optional: true
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: LLM_MODEL
                  optional: true
            - name: LLM_TEMPERATURE
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: LLM_TEMPERATURE
                  optional: true
            - name: LLM_MAX_TOKENS
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: LLM_MAX_TOKENS
                  optional: true
            - name: LLM_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: LLM_TIMEOUT_SECONDS
                  optional: true
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: AUTH_SECRET_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: agent-runtime
  namespace: travel-agent-cloud
spec:
  selector:
    app: agent-runtime
  ports:
    - name: http
      port: 8000
      targetPort: 8000
