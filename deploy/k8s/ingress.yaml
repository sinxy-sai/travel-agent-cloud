apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travel-agent-cloud
  namespace: travel-agent-cloud
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: travel-gateway
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: travel-gateway
                port:
                  number: 8080
          - path: /gateway
            pathType: Prefix
            backend:
              service:
                name: travel-gateway
                port:
                  number: 8080
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: travel-gateway
                port:
                  number: 8080
          - path: /tools
            pathType: Prefix
            backend:
              service:
                name: travel-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
