apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-agent-worker
  namespace: travel-agent-cloud
  labels:
    app: travel-agent-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-agent-worker
  template:
    metadata:
      labels:
        app: travel-agent-worker
    spec:
      containers:
        - name: travel-agent-worker
          image: docker.io/sinxysai/travel-agent-cloud-agent:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app.worker_main"]
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: RPC_TIMEOUT_SECONDS
              value: "5"
            - name: WORKER_RECONNECT_INITIAL_SECONDS
              value: "2"
            - name: WORKER_RECONNECT_MAX_SECONDS
              value: "30"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: DATABASE_URL
                  optional: false
            - name: MESSAGE_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: MESSAGE_QUEUE_URL
                  optional: false
