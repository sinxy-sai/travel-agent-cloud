apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime-worker
  namespace: travel-agent-cloud
  labels:
    app: agent-runtime-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-runtime-worker
  template:
    metadata:
      labels:
        app: agent-runtime-worker
    spec:
      containers:
        - name: agent-runtime-worker
          image: docker.io/sinxysai/travel-agent-cloud-agent-runtime:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.worker_main"]
          env:
            - name: APP_ENV
              value: production
            - name: LOG_LEVEL
              value: INFO
            - name: RPC_TIMEOUT_SECONDS
              value: "5"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: DATABASE_URL
                  optional: false
            - name: MESSAGE_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: MESSAGE_QUEUE_URL
                  optional: false
