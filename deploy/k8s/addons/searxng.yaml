apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: travel-agent-cloud
data:
  settings.yml: |
    use_default_settings: true

    server:
      secret_key: "travel-agent-cloud-k3s-searxng"
      limiter: false
      image_proxy: false

    search:
      formats:
        - html
        - json

    ui:
      static_use_hash: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: travel-agent-cloud
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_BASE_URL
              value: http://searxng:8080/
          volumeMounts:
            - name: searxng-config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: searxng-config
          configMap:
            name: searxng-config
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: travel-agent-cloud
spec:
  selector:
    app: searxng
  ports:
    - name: http
      port: 8080
      targetPort: 8080
