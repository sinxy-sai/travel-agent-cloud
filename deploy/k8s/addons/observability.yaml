apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: travel-agent-cloud
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alert-rules.yml

    scrape_configs:
      - job_name: travel-gateway
        metrics_path: /metrics
        static_configs:
          - targets: ["travel-gateway:8080"]

      - job_name: travel-auth
        metrics_path: /metrics
        static_configs:
          - targets: ["travel-auth:8300"]

      - job_name: travel-trip
        metrics_path: /metrics
        static_configs:
          - targets: ["travel-trip:8200"]

      - job_name: travel-agent
        metrics_path: /metrics
        static_configs:
          - targets: ["travel-agent:8400"]

      - job_name: travel-mcp
        metrics_path: /metrics
        static_configs:
          - targets: ["travel-mcp:8100"]

      - job_name: agent-runtime
        metrics_path: /metrics
        static_configs:
          - targets: ["agent-runtime:8000"]
  alert-rules.yml: |
    groups:
      - name: travel-agent-cloud-service-health
        rules:
          - alert: TravelServiceTargetDown
            expr: up{job=~"travel-.+|agent-runtime"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Travel Agent Cloud service target is down"
              description: "Prometheus cannot scrape {{ $labels.job }} for more than 2 minutes."

          - alert: TravelServiceHighErrorRate
            expr: |
              (
                sum by (service) (rate(travel_http_requests_total{status_code=~"5.."}[5m]))
                /
                clamp_min(sum by (service) (rate(travel_http_requests_total[5m])), 0.001)
              ) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Travel Agent Cloud service 5xx error rate is high"
              description: "{{ $labels.service }} has more than 5% 5xx responses for 5 minutes."

          - alert: TravelServiceHighLatencyP95
            expr: |
              histogram_quantile(
                0.95,
                sum by (service, le) (rate(travel_http_request_duration_seconds_bucket[5m]))
              ) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Travel Agent Cloud service P95 latency is high"
              description: "{{ $labels.service }} P95 HTTP latency is above 2 seconds for 5 minutes."

          - alert: TravelServiceNoTraffic
            expr: |
              sum by (service) (rate(travel_http_requests_total[10m])) == 0
            for: 15m
            labels:
              severity: info
            annotations:
              summary: "Travel Agent Cloud service has no observed HTTP traffic"
              description: "{{ $labels.service }} has not handled HTTP traffic for 15 minutes."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: travel-agent-cloud
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: travel-agent-cloud
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: Travel Agent Cloud
        orgId: 1
        folder: Travel Agent Cloud
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
