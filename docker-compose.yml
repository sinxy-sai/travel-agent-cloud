services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-agent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: travel_agent_cloud
      POSTGRES_USER: travel_agent
      POSTGRES_PASSWORD: travel_agent_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_agent -d travel_agent_cloud"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: travel-agent-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: travel_agent
      RABBITMQ_DEFAULT_PASS: travel_agent_dev
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: travel-agent-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: travel-agent-minio
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: travel_agent
      MINIO_ROOT_PASSWORD: travel_agent_dev_secret
    volumes:
      - minio-data:/data

  travel-mcp:
    build:
      context: ./services/travel-mcp
    container_name: travel-agent-mcp
    env_file:
      - ./services/travel-mcp/.env
    environment:
      AMAP_BASE_URL: https://restapi.amap.com
      AMAP_TIMEOUT_SECONDS: 8
    ports:
      - "8100:8100"

  travel-gateway:
    build:
      context: ./services
      dockerfile: travel-gateway/Dockerfile
    container_name: travel-agent-gateway
    environment:
      AGENT_RUNTIME_URL: http://agent-runtime:8000
      TRAVEL_AUTH_URL: http://travel-auth:8300
      TRAVEL_TRIP_URL: http://travel-trip:8200
      TRAVEL_AGENT_URL: http://travel-agent:8400
      TRAVEL_MCP_URL: http://travel-mcp:8100
      ALLOWED_ORIGINS: http://localhost:5173
      GATEWAY_REQUEST_TIMEOUT_SECONDS: 180
    ports:
      - "8080:8080"
    depends_on:
      agent-runtime:
        condition: service_healthy
      travel-auth:
        condition: service_healthy
      travel-trip:
        condition: service_healthy
      travel-agent:
        condition: service_healthy
      travel-mcp:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/gateway/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  travel-agent:
    build:
      context: ./services
      dockerfile: travel-agent/Dockerfile
    container_name: travel-agent-agent
    environment:
      AGENT_RUNTIME_URL: http://agent-runtime:8000
      ALLOWED_ORIGINS: http://localhost:5173
      AGENT_SERVICE_REQUEST_TIMEOUT_SECONDS: 180
    ports:
      - "8400:8400"
    depends_on:
      agent-runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8400/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  travel-auth:
    build:
      context: ./services
      dockerfile: travel-auth/Dockerfile
    container_name: travel-agent-auth
    environment:
      AGENT_RUNTIME_URL: http://agent-runtime:8000
      ALLOWED_ORIGINS: http://localhost:5173
      AUTH_SERVICE_REQUEST_TIMEOUT_SECONDS: 180
    ports:
      - "8300:8300"
    depends_on:
      agent-runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8300/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  travel-trip:
    build:
      context: ./services
      dockerfile: travel-trip/Dockerfile
    container_name: travel-agent-trip
    environment:
      AGENT_RUNTIME_URL: http://agent-runtime:8000
      DATABASE_URL: postgresql://travel_agent:travel_agent_dev@postgres:5432/travel_agent_cloud
      ALLOWED_ORIGINS: http://localhost:5173
      TRIP_SERVICE_REQUEST_TIMEOUT_SECONDS: 180
    ports:
      - "8200:8200"
    depends_on:
      agent-runtime:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  agent-runtime:
    build:
      context: ./agent-runtime
    container_name: travel-agent-runtime
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      ALLOWED_ORIGINS: http://localhost:5173
      DATABASE_URL: postgresql://travel_agent:travel_agent_dev@postgres:5432/travel_agent_cloud
      MESSAGE_QUEUE_URL: amqp://travel_agent:travel_agent_dev@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: travel-agent-cloud
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: travel_agent
      MINIO_SECRET_KEY: travel_agent_dev_secret
      MINIO_BUCKET: travel-agent-exports
      MINIO_SECURE: "false"
      RPC_TIMEOUT_SECONDS: 5
      WORKER_RECONNECT_INITIAL_SECONDS: 2
      WORKER_RECONNECT_MAX_SECONDS: 30
      TRAVEL_TOOL_PROVIDER: fastmcp
      FASTMCP_BASE_URL: http://travel-mcp:8100/mcp
      TRAVEL_TRIP_URL: http://travel-trip:8200
      TRAVEL_TRIP_TIMEOUT_SECONDS: 10
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  agent-runtime-worker:
    build:
      context: ./agent-runtime
    container_name: travel-agent-runtime-worker
    command: ["python", "-m", "app.worker_main"]
    profiles:
      - worker
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://travel_agent:travel_agent_dev@postgres:5432/travel_agent_cloud
      MESSAGE_QUEUE_URL: amqp://travel_agent:travel_agent_dev@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: travel-agent-cloud
      RPC_TIMEOUT_SECONDS: 5
      WORKER_RECONNECT_INITIAL_SECONDS: 2
      WORKER_RECONNECT_MAX_SECONDS: 30
      LOG_LEVEL: INFO
      TRAVEL_TOOL_PROVIDER: fastmcp
      FASTMCP_BASE_URL: http://travel-mcp:8100/mcp
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AGENT_API_BASE_URL: ""
        VITE_AMAP_JS_KEY: ${VITE_AMAP_JS_KEY:-}
        VITE_AMAP_SECURITY_JS_CODE: ${VITE_AMAP_SECURITY_JS_CODE:-}
    container_name: travel-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      travel-gateway:
        condition: service_healthy

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  minio-data:
