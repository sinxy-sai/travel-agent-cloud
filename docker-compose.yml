services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-agent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: travel_agent_cloud
      POSTGRES_USER: travel_agent
      POSTGRES_PASSWORD: travel_agent_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: travel-agent-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: travel_agent
      RABBITMQ_DEFAULT_PASS: travel_agent_dev
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    container_name: travel-agent-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: travel-agent-minio
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: travel_agent
      MINIO_ROOT_PASSWORD: travel_agent_dev_secret
    volumes:
      - minio-data:/data

  travel-mcp:
    build:
      context: ./services/travel-mcp
    container_name: travel-agent-mcp
    profiles:
      - tools
    ports:
      - "8100:8100"

  agent-runtime:
    build:
      context: ./agent-runtime
    container_name: travel-agent-runtime
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      ALLOWED_ORIGINS: http://localhost:5173
      DATABASE_URL: postgresql://travel_agent:travel_agent_dev@postgres:5432/travel_agent_cloud
      MESSAGE_QUEUE_URL: amqp://travel_agent:travel_agent_dev@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: travel-agent-cloud
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: travel_agent
      MINIO_SECRET_KEY: travel_agent_dev_secret
      MINIO_BUCKET: travel-agent-exports
      MINIO_SECURE: "false"
      RPC_TIMEOUT_SECONDS: 5
      WORKER_RECONNECT_INITIAL_SECONDS: 2
      WORKER_RECONNECT_MAX_SECONDS: 30
    depends_on:
      - postgres
      - rabbitmq
      - redis
      - minio

  agent-runtime-worker:
    build:
      context: ./agent-runtime
    container_name: travel-agent-runtime-worker
    command: ["python", "-m", "app.worker_main"]
    profiles:
      - worker
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://travel_agent:travel_agent_dev@postgres:5432/travel_agent_cloud
      MESSAGE_QUEUE_URL: amqp://travel_agent:travel_agent_dev@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: travel-agent-cloud
      RPC_TIMEOUT_SECONDS: 5
      WORKER_RECONNECT_INITIAL_SECONDS: 2
      WORKER_RECONNECT_MAX_SECONDS: 30
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - rabbitmq
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AGENT_API_BASE_URL: ""
    container_name: travel-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      - agent-runtime

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  minio-data:
