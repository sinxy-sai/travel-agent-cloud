services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-agent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: travel_agent_cloud
      POSTGRES_USER: travel_agent
      POSTGRES_PASSWORD: travel_agent_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: travel-agent-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: travel_agent
      RABBITMQ_DEFAULT_PASS: travel_agent_dev
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  agent-runtime:
    build:
      context: ./agent-runtime
    container_name: travel-agent-runtime
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      ALLOWED_ORIGINS: http://localhost:5173
      DATABASE_URL: postgresql://travel_agent:travel_agent_dev@postgres:5432/travel_agent_cloud
      MESSAGE_QUEUE_URL: amqp://travel_agent:travel_agent_dev@rabbitmq:5672/
      RPC_TIMEOUT_SECONDS: 5
    depends_on:
      - postgres
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AGENT_API_BASE_URL: ""
    container_name: travel-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      - agent-runtime

volumes:
  postgres-data:
  rabbitmq-data:
