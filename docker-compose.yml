services:
  agent-runtime:
    build:
      context: ./agent-runtime
    container_name: travel-agent-runtime
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      ALLOWED_ORIGINS: http://localhost:5173

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AGENT_API_BASE_URL: ""
    container_name: travel-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      - agent-runtime
