services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: travel_agent_cloud
      POSTGRES_USER: travel_agent
      POSTGRES_PASSWORD: travel_agent_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_agent -d travel_agent_cloud"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: travel_agent
      RABBITMQ_DEFAULT_PASS: travel_agent_dev
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: travel_agent
      MINIO_ROOT_PASSWORD: travel_agent_dev_secret
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  travel-mcp:
    image: travel-agent-cloud-mcp
    build:
      context: ./services/mcp
    container_name: mcp
    env_file:
      - ./services/mcp/.env
    ports:
      - "8100:8100"

  travel-gateway:
    image: travel-agent-cloud-gateway
    build:
      context: ./services
      dockerfile: gateway/Dockerfile
    container_name: gateway
    env_file:
      - ./services/gateway/.env
    ports:
      - "8080:8080"
    depends_on:
      agent-runtime:
        condition: service_healthy
      travel-auth:
        condition: service_healthy
      travel-trip:
        condition: service_healthy
      travel-agent:
        condition: service_healthy
      travel-mcp:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/gateway/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  travel-agent:
    image: travel-agent-cloud-agent
    build:
      context: ./services
      dockerfile: agent/Dockerfile
    container_name: agent
    env_file:
      - ./services/agent/.env
    ports:
      - "8400:8400"
    depends_on:
      agent-runtime:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8400/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  travel-auth:
    image: travel-agent-cloud-auth
    build:
      context: ./services
      dockerfile: auth/Dockerfile
    container_name: auth
    env_file:
      - ./services/auth/.env
    ports:
      - "8300:8300"
    depends_on:
      agent-runtime:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8300/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  travel-trip:
    image: travel-agent-cloud-trip
    build:
      context: ./services
      dockerfile: trip/Dockerfile
    container_name: trip
    env_file:
      - ./services/trip/.env
    ports:
      - "8200:8200"
    depends_on:
      agent-runtime:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  agent-runtime:
    image: travel-agent-cloud-agent-runtime
    build:
      context: ./agent-runtime
    container_name: runtime
    env_file:
      - ./agent-runtime/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  travel-agent-worker:
    image: travel-agent-cloud-agent
    container_name: agent-worker
    command: ["python", "-m", "app.worker_main"]
    profiles:
      - worker
    env_file:
      - ./services/agent/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    image: travel-agent-cloud-frontend
    build:
      context: ./frontend
      args:
        VITE_AGENT_API_BASE_URL: ""
        VITE_AMAP_JS_KEY: ${VITE_AMAP_JS_KEY:-}
        VITE_AMAP_SECURITY_JS_CODE: ${VITE_AMAP_SECURITY_JS_CODE:-}
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      travel-gateway:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    profiles:
      - observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      travel-gateway:
        condition: service_healthy
      travel-auth:
        condition: service_healthy
      travel-trip:
        condition: service_healthy
      travel-agent:
        condition: service_healthy
      agent-runtime:
        condition: service_healthy
      travel-mcp:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    profiles:
      - observability
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
