name: Deploy K3s

on:
  workflow_run:
    workflows: ["Build Images Docker Hub"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      imageTag:
        description: "Docker image tag to deploy"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.imageTag || github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/travel-agent-cloud
          chmod 600 ~/.ssh/travel-agent-cloud
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload Kubernetes manifests
        run: |
          ssh -i ~/.ssh/travel-agent-cloud "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p ~/travel-agent-cloud/deploy"
          scp -i ~/.ssh/travel-agent-cloud -r deploy/k8s "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/travel-agent-cloud/deploy/"

      - name: Apply Kubernetes manifests
        run: |
          ssh -i ~/.ssh/travel-agent-cloud "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "\
            sudo kubectl apply -k ~/travel-agent-cloud/deploy/k8s && \
            sudo kubectl set image deployment/frontend frontend=docker.io/${DOCKERHUB_USERNAME}/travel-agent-cloud-frontend:${IMAGE_TAG} -n travel-agent-cloud && \
            sudo kubectl set image deployment/agent-runtime agent-runtime=docker.io/${DOCKERHUB_USERNAME}/travel-agent-cloud-agent-runtime:${IMAGE_TAG} -n travel-agent-cloud && \
            sudo kubectl set image deployment/travel-gateway travel-gateway=docker.io/${DOCKERHUB_USERNAME}/travel-agent-cloud-gateway:${IMAGE_TAG} -n travel-agent-cloud && \
            sudo kubectl set image deployment/travel-auth travel-auth=docker.io/${DOCKERHUB_USERNAME}/travel-agent-cloud-auth:${IMAGE_TAG} -n travel-agent-cloud && \
            sudo kubectl set image deployment/travel-trip travel-trip=docker.io/${DOCKERHUB_USERNAME}/travel-agent-cloud-trip:${IMAGE_TAG} -n travel-agent-cloud && \
            sudo kubectl set image deployment/travel-agent travel-agent=docker.io/${DOCKERHUB_USERNAME}/travel-agent-cloud-agent:${IMAGE_TAG} -n travel-agent-cloud && \
            sudo kubectl set image deployment/travel-mcp travel-mcp=docker.io/${DOCKERHUB_USERNAME}/travel-agent-cloud-mcp:${IMAGE_TAG} -n travel-agent-cloud && \
            sudo kubectl rollout restart deployment/frontend -n travel-agent-cloud && \
            sudo kubectl rollout restart deployment/agent-runtime -n travel-agent-cloud && \
            sudo kubectl rollout restart deployment/travel-gateway -n travel-agent-cloud && \
            sudo kubectl rollout restart deployment/travel-auth -n travel-agent-cloud && \
            sudo kubectl rollout restart deployment/travel-trip -n travel-agent-cloud && \
            sudo kubectl rollout restart deployment/travel-agent -n travel-agent-cloud && \
            sudo kubectl rollout restart deployment/travel-mcp -n travel-agent-cloud && \
            sudo kubectl rollout status deployment/frontend -n travel-agent-cloud --timeout=180s && \
            sudo kubectl rollout status deployment/agent-runtime -n travel-agent-cloud --timeout=180s && \
            sudo kubectl rollout status deployment/travel-gateway -n travel-agent-cloud --timeout=180s && \
            sudo kubectl rollout status deployment/travel-auth -n travel-agent-cloud --timeout=180s && \
            sudo kubectl rollout status deployment/travel-trip -n travel-agent-cloud --timeout=180s && \
            sudo kubectl rollout status deployment/travel-agent -n travel-agent-cloud --timeout=180s && \
            sudo kubectl rollout status deployment/travel-mcp -n travel-agent-cloud --timeout=180s && \
            sudo kubectl get pods -n travel-agent-cloud"
