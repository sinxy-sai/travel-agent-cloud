name: Build Images Docker Hub

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-frontend
  AGENT_RUNTIME_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-agent-runtime
  IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            VITE_AGENT_API_BASE_URL=

      - name: Build and push agent runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-runtime
          push: true
          tags: |
            ${{ env.AGENT_RUNTIME_IMAGE }}:latest
            ${{ env.AGENT_RUNTIME_IMAGE }}:${{ env.IMAGE_TAG }}
