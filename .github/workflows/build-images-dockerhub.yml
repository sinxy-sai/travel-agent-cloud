name: Build Images Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-frontend
  AGENT_RUNTIME_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-agent-runtime

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_AGENT_API_BASE_URL=

      - name: Build and push agent runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-runtime
          push: true
          tags: |
            ${{ env.AGENT_RUNTIME_IMAGE }}:latest
            ${{ env.AGENT_RUNTIME_IMAGE }}:${{ github.sha }}

