name: Build Images Docker Hub

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-frontend
  AGENT_RUNTIME_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-agent-runtime
  TRAVEL_GATEWAY_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-gateway
  TRAVEL_AUTH_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-auth
  TRAVEL_TRIP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-trip
  TRAVEL_AGENT_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-agent
  TRAVEL_MCP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/travel-agent-cloud-mcp
  IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            VITE_AGENT_API_BASE_URL=

      - name: Build and push agent runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-runtime
          push: true
          tags: |
            ${{ env.AGENT_RUNTIME_IMAGE }}:latest
            ${{ env.AGENT_RUNTIME_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build and push travel gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./services
          file: ./services/gateway/Dockerfile
          push: true
          tags: |
            ${{ env.TRAVEL_GATEWAY_IMAGE }}:latest
            ${{ env.TRAVEL_GATEWAY_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build and push travel auth image
        uses: docker/build-push-action@v6
        with:
          context: ./services
          file: ./services/auth/Dockerfile
          push: true
          tags: |
            ${{ env.TRAVEL_AUTH_IMAGE }}:latest
            ${{ env.TRAVEL_AUTH_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build and push travel trip image
        uses: docker/build-push-action@v6
        with:
          context: ./services
          file: ./services/trip/Dockerfile
          push: true
          tags: |
            ${{ env.TRAVEL_TRIP_IMAGE }}:latest
            ${{ env.TRAVEL_TRIP_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build and push travel agent image
        uses: docker/build-push-action@v6
        with:
          context: ./services
          file: ./services/agent/Dockerfile
          push: true
          tags: |
            ${{ env.TRAVEL_AGENT_IMAGE }}:latest
            ${{ env.TRAVEL_AGENT_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build and push travel MCP image
        uses: docker/build-push-action@v6
        with:
          context: ./services/mcp
          push: true
          tags: |
            ${{ env.TRAVEL_MCP_IMAGE }}:latest
            ${{ env.TRAVEL_MCP_IMAGE }}:${{ env.IMAGE_TAG }}
