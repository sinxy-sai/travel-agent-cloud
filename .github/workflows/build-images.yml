name: Build Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/travel-agent-cloud-frontend
  AGENT_RUNTIME_IMAGE: ghcr.io/${{ github.repository_owner }}/travel-agent-cloud-agent-runtime
  TRAVEL_GATEWAY_IMAGE: ghcr.io/${{ github.repository_owner }}/travel-agent-cloud-gateway
  TRAVEL_AUTH_IMAGE: ghcr.io/${{ github.repository_owner }}/travel-agent-cloud-auth
  TRAVEL_TRIP_IMAGE: ghcr.io/${{ github.repository_owner }}/travel-agent-cloud-trip
  TRAVEL_AGENT_IMAGE: ghcr.io/${{ github.repository_owner }}/travel-agent-cloud-agent
  TRAVEL_MCP_IMAGE: ghcr.io/${{ github.repository_owner }}/travel-agent-cloud-mcp

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_AGENT_API_BASE_URL=

      - name: Build and push agent runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./agent-runtime
          push: true
          tags: |
            ${{ env.AGENT_RUNTIME_IMAGE }}:latest
            ${{ env.AGENT_RUNTIME_IMAGE }}:${{ github.sha }}

      - name: Build and push travel gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./services
          file: ./services/gateway/Dockerfile
          push: true
          tags: |
            ${{ env.TRAVEL_GATEWAY_IMAGE }}:latest
            ${{ env.TRAVEL_GATEWAY_IMAGE }}:${{ github.sha }}

      - name: Build and push travel auth image
        uses: docker/build-push-action@v6
        with:
          context: ./services
          file: ./services/auth/Dockerfile
          push: true
          tags: |
            ${{ env.TRAVEL_AUTH_IMAGE }}:latest
            ${{ env.TRAVEL_AUTH_IMAGE }}:${{ github.sha }}

      - name: Build and push travel trip image
        uses: docker/build-push-action@v6
        with:
          context: ./services
          file: ./services/trip/Dockerfile
          push: true
          tags: |
            ${{ env.TRAVEL_TRIP_IMAGE }}:latest
            ${{ env.TRAVEL_TRIP_IMAGE }}:${{ github.sha }}

      - name: Build and push travel agent image
        uses: docker/build-push-action@v6
        with:
          context: ./services
          file: ./services/agent/Dockerfile
          push: true
          tags: |
            ${{ env.TRAVEL_AGENT_IMAGE }}:latest
            ${{ env.TRAVEL_AGENT_IMAGE }}:${{ github.sha }}

      - name: Build and push travel MCP image
        uses: docker/build-push-action@v6
        with:
          context: ./services/mcp
          push: true
          tags: |
            ${{ env.TRAVEL_MCP_IMAGE }}:latest
            ${{ env.TRAVEL_MCP_IMAGE }}:${{ github.sha }}
