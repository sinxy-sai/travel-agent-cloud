services:
  travel-gateway:
    environment:
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAMESPACE: travel-agent-cloud
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    depends_on:
      tempo:
        condition: service_started

